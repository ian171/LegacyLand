name: LegacyLand
version: '1.0-Beta2.1'
main: net.chen.legacyLand.LegacyLand
api-version: '1.21'
authors: [ Chen ]
depend: [Towny,Vault]
softdepend: [PlaceholderAPI, CraftEngine,ItemsAdder,BlueMap]
folia-supported: true

commands:
  legacylandadmin:
    description: LegacyLand 管理命令
    usage: /legacylandadmin reload
    aliases: [ ladmin ]
  legacy:
    description: LegacyLand 扩展命令
    usage: /legacy <government|role|info>
    aliases: [ll]
  tax:
    description: 税收系统命令
    usage: /tax <info|set>
    aliases: [ shui ]
  diplomacy:
    description: 外交系统命令
    usage: /diplomacy <info|war|peace|ally|trade|tech|neutral>
    aliases: [ diplo, waijiao ]
  war:
    description: 战争系统命令
    usage: /war <start|info|join|surrender|peace|list>
    aliases: [ zhanzheng ]
  siege:
    description: 攻城战系统命令
    usage: /siege <outpost|station|supply|core|info>
    aliases: [ gongcheng ]
  player:
    description: 玩家系统命令
    usage: /player <info|profession|stats>
    aliases: [ p, wanjia ]
  status:
    description: 状态系统命令
    usage: /status <info|heal>
    aliases: [ zhuangtai ]
  heal:
    description: 医疗物品使用命令（内部命令）
    usage: /legacyland:heal <player> <itemType>
  drink:
    description: 水壶使用命令（内部命令）
    usage: /legacyland:drink <player>
  season:
    description: 季节系统命令
    usage: /season <info|set|config>
    aliases: [ jijie ]
  flagwar:
    description: FlagWar 旗帜战争命令
    usage: /flagwar <info|list|cancel>
    aliases: [ fw, qizhan ]
  market:
    description: 市场管理命令
    usage: /market <create|delete|info>
    aliases: [ sc, shichang ]
  price:
    description: 设置销售箱价格
    usage: /price set <价格>
    aliases: [ jiage ]
  law:
    description: 法令系统命令
    usage: /law <enact|propose|vote|repeal|list|proposals>
    aliases: [ faling ]
  tech:
    description: 科技树系统命令
    usage: /tech <research|list|info|status>
    aliases: [ keji ]
  economy:
    description: 经济系统命令
    usage: /economy <create|seal|mint|info|deposit|withdraw|rate>
    aliases: [ eco, jingji ]
  bank:
    description: 银行系统命令
    usage: /bank <deposit|withdraw|balance|transfer|exchange>
    aliases: [ yinhang ]
  finance:
    description: 金融系统命令（贷款、期货）
    usage: /finance <loan|repay|loans|future|buy|deliver|claim|futures>
    aliases: [ jinrong ]
  ecowar:
    description: 经济统计与战争命令
    usage: /ecowar <stats|gdp|inflation|embargo|lift|sanction|wars>
    aliases: [ jingjizhanzhen ]
  resource:
    description: 资源系统命令
    usage: /resource <give|zone|transport|info>
    aliases: [ ziyuan ]
